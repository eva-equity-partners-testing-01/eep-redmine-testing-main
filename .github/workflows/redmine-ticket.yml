name: Validate Redmine Ticket on PR

on:
  pull_request:
    branches:
      - develop
    types: [opened, reopened, synchronize, closed]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate-ticket:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Extract issue number from branch
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Branch name: $BRANCH"
          ISSUE_ID=$(echo "$BRANCH" | grep -oP '\d+')
          echo "Extracted issue ID: $ISSUE_ID"
          if [ -z "$ISSUE_ID" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Check ticket in Redmine
        if: steps.extract.outputs.found == 'true'
        id: check
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          PROJECT_NAME="Automatic Linking of PR"

          echo "Checking Redmine for issue: $ISSUE_ID"

          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://redmine.evaequitymtest.com/issues/$ISSUE_ID.json")

          echo "HTTP status: $RESPONSE"
          echo "Redmine response body:"
          cat response.json

          if [ "$RESPONSE" == "200" ]; then
            PROJECT=$(cat response.json | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d['issue']['project']['name'])")
            echo "Ticket belongs to project: $PROJECT"
            echo "project=$PROJECT" >> $GITHUB_OUTPUT
            echo "expected=$PROJECT_NAME" >> $GITHUB_OUTPUT
          else
            echo "project=not_found" >> $GITHUB_OUTPUT
            echo "expected=$PROJECT_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Get PR reviewers and approvers
        if: steps.extract.outputs.found == 'true'
        id: reviewers
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            // Get requested reviewers
            const reviewRequests = await github.rest.pulls.listRequestedReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const requestedReviewers = reviewRequests.data.users
              .map(u => u.login).join(', ') || 'None';

            // Get submitted reviews (approvals)
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const approvers = reviews.data
              .filter(r => r.state === 'APPROVED')
              .map(r => r.user.login)
              .join(', ') || 'No approvals yet';

            const reviewers = reviews.data
              .map(r => `${r.user.login} (${r.state})`)
              .join(', ') || 'No reviews yet';

            core.setOutput('requested_reviewers', requestedReviewers);
            core.setOutput('approvers', approvers);
            core.setOutput('all_reviews', reviewers);

      - name: Post error comment on PR — wrong project
        if: |
          steps.extract.outputs.found == 'false' ||
          steps.check.outputs.project != steps.check.outputs.expected
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueId = '${{ steps.extract.outputs.issue_id }}';
            const foundProject = '${{ steps.check.outputs.project }}';
            const branch = context.payload.pull_request.head.ref;

            let msg = '';
            if ('${{ steps.extract.outputs.found }}' === 'false') {
              msg = [
                `Branch \`${branch}\` does not contain a valid Redmine ticket number.`,
                ``,
                `Please rename your branch to follow the format:`,
                `\`features/<ticket-id>\``,
                ``,
                `Example: \`features/161\``
              ].join('\n');
            } else {
              msg = [
                `Ticket **#${issueId}** was found in project \`${foundProject || 'not found'}\`.`,
                ``,
                `This PR must reference a ticket from the **Automatic Linking of PR** project only.`,
                ``,
                `Please make sure your branch references a valid ticket from the correct project.`
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Redmine Ticket Validation Failed\n\n${msg}`
            });

            core.setFailed('Redmine ticket validation failed');

      - name: Post success comment on PR — ticket verified
        if: |
          steps.extract.outputs.found == 'true' &&
          steps.check.outputs.project == steps.check.outputs.expected
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueId = '${{ steps.extract.outputs.issue_id }}';
            const project = '${{ steps.check.outputs.project }}';
            const pr = context.payload.pull_request;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## Redmine Ticket Validation Passed\n\nTicket **#${issueId}** verified in **${project}**.`
            });

      - name: Add comment to Redmine ticket — PR opened
        if: |
          steps.extract.outputs.found == 'true' &&
          steps.check.outputs.project == steps.check.outputs.expected &&
          github.event.action != 'closed'
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_STATE="${{ github.event.action }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          FROM_BRANCH="${{ github.event.pull_request.head.ref }}"
          TO_BRANCH="${{ github.event.pull_request.base.ref }}"
          REPO="${{ github.repository }}"
          REQUESTED_REVIEWERS="${{ steps.reviewers.outputs.requested_reviewers }}"
          ALL_REVIEWS="${{ steps.reviewers.outputs.all_reviews }}"
          APPROVERS="${{ steps.reviewers.outputs.approvers }}"
          PR_CREATED_AT="${{ github.event.pull_request.created_at }}"

          COMMENT="### GitHub Pull Request Notification

**Status:** PR ${PR_STATE}
**PR Number:** #${PR_NUMBER}
**PR Title:** ${PR_TITLE}
**PR URL:** ${PR_URL}

---

**Branch Details:**
- **From Branch:** \`${FROM_BRANCH}\`
- **To Branch:** \`${TO_BRANCH}\`
- **Repository:** \`${REPO}\`

---

**People:**
- **PR Opened By:** @${PR_AUTHOR}
- **Requested Reviewers:** ${REQUESTED_REVIEWERS}
- **Reviews Submitted:** ${ALL_REVIEWS}
- **Approved By:** ${APPROVERS}

---

**Timeline:**
- **PR Created At:** ${PR_CREATED_AT}

---

_Added automatically by GitHub Actions webhook_"

          # Send comment to Redmine ticket
          curl -s -X PUT \
            -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"issue\": {\"notes\": $(echo "$COMMENT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}}" \
            "https://redmine.evaequitymtest.com/issues/$ISSUE_ID.json"

          echo "Redmine ticket #$ISSUE_ID updated with PR comment"

      - name: Add comment to Redmine ticket — PR closed or merged
        if: |
          steps.extract.outputs.found == 'true' &&
          steps.check.outputs.project == steps.check.outputs.expected &&
          github.event.action == 'closed'
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          FROM_BRANCH="${{ github.event.pull_request.head.ref }}"
          TO_BRANCH="${{ github.event.pull_request.base.ref }}"
          REPO="${{ github.repository }}"
          MERGED="${{ github.event.pull_request.merged }}"
          MERGED_BY="${{ github.event.pull_request.merged_by.login }}"
          MERGED_AT="${{ github.event.pull_request.merged_at }}"
          CLOSED_AT="${{ github.event.pull_request.closed_at }}"
          APPROVERS="${{ steps.reviewers.outputs.approvers }}"
          ALL_REVIEWS="${{ steps.reviewers.outputs.all_reviews }}"

          if [ "$MERGED" == "true" ]; then
            STATUS="MERGED"
            MERGE_INFO="- **Merged By:** @${MERGED_BY}
          - **Merged At:** ${MERGED_AT}"
          else
            STATUS="CLOSED WITHOUT MERGE"
            MERGE_INFO="- **Closed At:** ${CLOSED_AT}
          - **Merged:** No"
          fi

          COMMENT="### GitHub Pull Request ${STATUS}

**Status:** ${STATUS}
**PR Number:** #${PR_NUMBER}
**PR Title:** ${PR_TITLE}
**PR URL:** ${PR_URL}

---

**Branch Details:**
- **From Branch:** \`${FROM_BRANCH}\`
- **To Branch:** \`${TO_BRANCH}\`
- **Repository:** \`${REPO}\`

---

**People:**
- **PR Opened By:** @${PR_AUTHOR}
- **Approved By:** ${APPROVERS}
- **All Reviews:** ${ALL_REVIEWS}

---

**Merge Details:**
${MERGE_INFO}

---

_Added automatically by GitHub Actions webhook_"

          curl -s -X PUT \
            -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"issue\": {\"notes\": $(echo "$COMMENT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}}" \
            "https://redmine.evaequitymtest.com/issues/$ISSUE_ID.json"

          echo "Redmine ticket #$ISSUE_ID updated with PR closed/merged comment"
